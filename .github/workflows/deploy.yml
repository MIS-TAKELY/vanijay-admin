name: Build & Deploy

on:
  push:
    branches: ["main"]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: mis-takely/vanijay-admin

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install cosign
        if: github.event_name != 'pull_request'
        uses: sigstore/cosign-installer@59acb6260d9c0ba8f4a2f9d9b48431a222b68e20
        with:
          cosign-release: "v2.2.4"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log into registry ${{ env.REGISTRY }}
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha

      - name: Build and push Docker image
        id: build-and-push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
          sbom: false

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          port: ${{ secrets.VPS_SSH_PORT }} # optional if not default 22
          script: |
            set -e

            cd ${{ secrets.VPS_PROJECT_PATH }}

            # Ensure clean pull
            git reset --hard
            git clean -fd
            git pull https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/MIS-TAKELY/vanijay-admin.git main

            echo "Logging into GitHub Container Registry..."
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            echo "Pulling latest Docker images..."
            docker compose pull

            echo "Starting database container..."
            docker compose up -d admin_db

            echo "Waiting for database to be ready..."
            until docker compose exec -T admin_db pg_isready -h localhost -p 5432; do
              sleep 2
            done

            echo "Connecting shared database to network..."
            docker network connect vanijay_network vanijay_buyer_seller_database || true

            # Load environment variables from .env if it exists
            if [ -f .env ]; then
              set -o allexport
              source .env
              set +o allexport
            fi

            echo "Running Prisma migrations (Admin DB)..."
            # We use the app image to run migrations because it contains the schema and prisma client
            docker run --rm \
              --network vanijay_network \
              --env ADMIN_DATABASE_URL="$ADMIN_DATABASE_URL" \
              --env DATABASE_URL="$DATABASE_URL" \
              ghcr.io/mis-takely/vanijay-admin:latest \
              npx prisma@7.2.0 migrate deploy --config prisma.config.ts

            echo "Running Shared Prisma migrations..."
            docker run --rm \
              --network vanijay_network \
              --env ADMIN_DATABASE_URL="$ADMIN_DATABASE_URL" \
              --env DATABASE_URL="$DATABASE_URL" \
              ghcr.io/mis-takely/vanijay-admin:latest \
              npx prisma@7.2.0 migrate deploy --config prisma.main.config.ts

            echo "Starting application containers..."
            # This recreates the app container with the new image
            docker compose up -d --force-recreate admin

            echo "Cleaning up unused Docker images..."
            docker image prune -f
