name: Build, Push, and Deploy

on:
  push:
    branches: ["main"]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: sachinsharma-lordheydes/vanijay-admin

jobs:
  lint:
    uses: ./.github/workflows/reusable-lint.yml

  build:
    runs-on: ubuntu-latest
    needs: lint
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install cosign
        if: github.event_name != 'pull_request'
        uses: sigstore/cosign-installer@59acb6260d9c0ba8f4a2f9d9b48431a222b68e20
        with:
          cosign-release: "v2.2.4"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log into registry ${{ env.REGISTRY }}
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ github.sha }}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        id: build-and-push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          port: ${{ secrets.VPS_SSH_PORT }}
          script: |
            set -e

            cd ${{ secrets.VPS_PROJECT_PATH }}

            IMAGE_TAG=${{ github.sha }}
            IMAGE_NAME=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

            echo "Pulling Docker image $IMAGE_NAME:$IMAGE_TAG..."
            docker pull "$IMAGE_NAME:$IMAGE_TAG"

            echo "Starting database container..."
            docker compose up -d admin_db

            echo "Waiting for database to be ready..."
            until docker compose exec -T admin_db pg_isready -h localhost -p 5432; do
              sleep 2
            done

            echo "Connecting shared database to network..."
            docker network connect vanijay_network vanijay_buyer_seller_database || true

            if [ -f .env ]; then
              set -o allexport
              source .env
              set +o allexport
            fi

            echo "Running Prisma migrations (Admin DB)..."
            docker run --rm \
              --network vanijay_network \
              --env ADMIN_DATABASE_URL="$ADMIN_DATABASE_URL" \
              --env DATABASE_URL="$DATABASE_URL" \
              "$IMAGE_NAME:$IMAGE_TAG" \
              npx prisma migrate deploy --config prisma.config.ts

            echo "Running Shared Prisma migrations..."
            docker run --rm \
              --network vanijay_network \
              --env ADMIN_DATABASE_URL="$ADMIN_DATABASE_URL" \
              --env DATABASE_URL="$DATABASE_URL" \
              "$IMAGE_NAME:$IMAGE_TAG" \
              npx prisma migrate deploy --config prisma.main.config.ts

            echo "Updating docker-compose.yaml..."
            sed -i "s|image: ghcr.io/sachinsharma-lordheydes/vanijay-admin:.*|image: $IMAGE_NAME:$IMAGE_TAG|" docker-compose.yaml

            echo "Starting application containers..."
            docker compose up -d --force-recreate admin

            echo "Cleaning up unused Docker images..."
            docker image prune -f
